<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sasha Andrews — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@500&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ──────────────────────────────────── */
    :root {
      --teal:        #04879c;
      --teal-dark:   #035f6e;
      --mint:        #21e6c1;
      --smoke:       #f5f5f5;
      --charcoal:    #0b1215;
      --ink:         #1e1f26;
      --muted:       #79a9b1;
      --white:       #ffffff;
      --card-radius: 40px;
      --btn-radius:  40px;
      --nav-h:       90px;
      --ease:        cubic-bezier(.4,0,.2,1);
      --dur:         0.35s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--white);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* ─── NAV STYLES ─────────────────────────────────────── */
    nav {
      position: fixed; inset: 0 0 auto;
      z-index: 200;
      height: var(--nav-h);
      background: var(--teal);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 64px);
      box-shadow: 0 2px 24px rgba(4,135,156,.3);
    }
    .logo {
      font-family: 'Inknut Antiqua', serif;
      font-size: 1rem; color: var(--mint);
      background: var(--white); border: 2px solid var(--white);
      border-radius: 999px; padding: 7px 18px;
      text-decoration: none;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    }
    .logo:hover { background: var(--mint); color: var(--charcoal); }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: .95rem; font-weight: 400;
      color: var(--white); text-decoration: none;
      position: relative; padding-bottom: 3px;
      transition: color var(--dur) var(--ease);
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 100%;
      height: 1.5px; background: var(--mint);
      transition: right var(--dur) var(--ease);
    }
    .nav-links a:hover { color: var(--mint); }
    .nav-links a:hover::after { right: 0; }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 4px;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--white); border-radius: 2px;
      transition: var(--dur) var(--ease);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ─── HERO ─────────────────────────────────────── */
    .portfolio-hero {
      position: relative;
      overflow: hidden;
      display: flex; align-items: flex-end; justify-content: flex-end;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('hero-bg.jpg') center / cover no-repeat var(--teal-dark);
      transform: scale(1.04);
      animation: zoomOut 14s ease-out forwards;
    }
    @keyframes zoomOut { to { transform: scale(1); } }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 40%, rgba(4,135,156,.6) 100%);
    }
    .hero-text {
      position: relative; z-index: 2;
      text-align: right;
      padding: 0 clamp(28px, 8vw, 120px) clamp(40px, 8vh, 100px);
      animation: fadeUp .9s .2s both;
    }
    .hero-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.6rem, 6.5vw, 5.2rem);
      font-weight: 400; line-height: 1.08;
      color: var(--white);
      text-shadow: 0 4px 32px rgba(0,0,0,.35);
    }

    /* ─── WORK SECTION ──────────────────────────────── */
    .portfolio-section {
      padding: clamp(56px, 8vw, 100px) clamp(28px, 6vw, 80px);
      background: var(--white);
    }
    .section-label {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--ink); margin-bottom: 40px;
    }
    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
      gap: 28px;
    }
    .work-card {
      border-radius: var(--card-radius);
      overflow: hidden; position: relative;
      text-decoration: none; display: block;
      max-width: 320px;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .work-card:hover { transform: translateY(-10px); box-shadow: 0 28px 64px rgba(0,0,0,.16); }
    .work-card.c-mint  { background: transparent; }
    .work-card.c-smoke { background: transparent; }
    .work-card.c-teal  { background: transparent; }

    .card-title {
      position: absolute; top: 24px; left: 0; right: 0;
      text-align: center; padding: 0 16px; z-index: 2;
      font-size: clamp(.85rem, 1.2vw, 1rem);
      font-weight: 500; line-height: 1.4;
    }
    .c-mint .card-title, .c-smoke .card-title { color: var(--charcoal); }
    .c-teal .card-title { color: var(--smoke); }

    .card-mockup {
      width: 100%; height: auto;
      display: block;
      border-radius: var(--card-radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(3,95,110,.82);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; border-radius: var(--card-radius);
      transition: opacity var(--dur) var(--ease);
      cursor: pointer;
    }
    .card-overlay span { color: var(--white); font-weight: 600; font-size: 1.05rem; }
    .work-card:hover .card-overlay { opacity: 1; }

    /* ─── CONTACT ──────────────────────────────────── */
    #contact { background: var(--white); }
    .contact-card {
      background: var(--muted);
      border-radius: var(--card-radius);
      padding: clamp(48px,6vw,80px) clamp(32px,5vw,72px);
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: space-between; gap: 32px;
      position: relative; overflow: hidden;
    }
    .contact-card::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(33,230,193,.15); pointer-events: none;
    }
    .contact-headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      color: var(--charcoal); line-height: 1.15; font-weight: 400;
      position: relative; z-index: 1;
    }
    .btn-mint {
      position: relative; z-index: 1;
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--mint); color: var(--charcoal);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      padding: 15px 30px; border-radius: var(--btn-radius);
      box-shadow: 0 4px 20px rgba(33,230,193,.4);
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease),
                  transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .btn-mint:hover {
      background: var(--teal); color: var(--white);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(4,135,156,.38);
    }
    .arr { transition: transform var(--dur) var(--ease); }
    .btn-mint:hover .arr { transform: translateX(5px); }

    /* ─── FOOTER ─────────────────────────────────────── */
    footer {
      background: var(--teal);
      padding: 28px clamp(28px,6vw,80px);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    footer p { font-size: .88rem; color: rgba(255,255,255,.85); }
    .footer-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); }

    /* ─── ANIMATIONS ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: none; }
    }
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity .72s var(--ease), transform .72s var(--ease);
    }
    .reveal.in { opacity: 1; transform: none; }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 800px) {
      .nav-links {
        display: none; flex-direction: column;
        position: absolute; top: var(--nav-h); left: 0; right: 0;
        background: var(--teal-dark);
        padding: 20px 32px; gap: 20px;
      }
      .nav-links.open { display: flex; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <!-- NAV COMPONENT PLACEHOLDER -->
  <div id="nav-component"></div>

  <!-- HERO -->
  <section class="portfolio-hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <h1>Portfolio</h1>
    </div>
  </section>

  <!-- MY WORK -->
  <section class="portfolio-section">
    <h2 class="section-label reveal">My Work</h2>
    <div class="work-grid">

      <!-- Save your mockup images from Figma as "img-compliance.png", "img-resort.png", "img-recruitment.png" -->
      <a class="work-card c-mint reveal" href="compliance-management.html">
        <div class="card-title">Compliance<br>Management App</div>
        <div class="card-overlay"><span>View Project →</span></div>
        <img class="card-mockup" src="Images/Frame 1597880336.png" alt="Compliance Management App" />
      </a>

      <a class="work-card c-smoke reveal" href="resort-booking-membership-app.html" style="transition-delay:.1s">
        <div class="card-title">Resort &amp;<br>Membership App</div>
        <div class="card-overlay"><span>View Project →</span></div>
        <img class="card-mockup" src="Images/Frame 1597880337.png" alt="Resort &amp; Membership App" />
      </a>

      <a class="work-card c-teal reveal" href="recruitment-brochure.html" style="transition-delay:.2s">
        <div class="card-title">Recruitment<br>Brochure Site</div>
        <div class="card-overlay"><span>View Project →</span></div>
        <img class="card-mockup" src="Images/Frame 1597880338.png" alt="Recruitment Brochure Site" />
      </a>

    </div>
  </section>

  <!-- CONTACT COMPONENT PLACEHOLDER -->
  <div id="contact-component"></div>

  <!-- FOOTER COMPONENT PLACEHOLDER -->
  <div id="footer-component" style="display: block;"></div>

  <script src="components/loader.js"></script>
  <script>
    // Hamburger toggle
    const ham = document.getElementById('ham');
    const navLinks = document.getElementById('navLinks');
    if (ham && navLinks) {
      ham.addEventListener('click', () => {
        ham.classList.toggle('open');
        navLinks.classList.toggle('open');
      });
      navLinks.querySelectorAll('a').forEach(a =>
        a.addEventListener('click', () => {
          ham.classList.remove('open');
          navLinks.classList.remove('open');
        })
      );
    }

    // Scroll reveal
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('in')),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  </script>

</body>
</html>
